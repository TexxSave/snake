<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Snake Game</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    background: black;
    color: white;
    text-align: center;
    font-family: Arial;
}

canvas {
    background: #111;
    margin-top: 10px;
}

/* Boutons */
.controls {
    margin-top: 15px;
}

button {
    width: 70px;
    height: 70px;
    margin: 5px;
    font-size: 24px;
    border: none;
    border-radius: 10px;
    background: #333;
    color: white;
}

button:active {
    background: #555;
}
</style>
</head>

<body>

<h2>Snake</h2>
<p id="score">Score: 0</p>

<canvas id="game" width="300" height="300"></canvas>

<div class="controls">
    <div>
        <button onclick="setDir(0,-1)">⬆️</button>
    </div>
    <div>
        <button onclick="setDir(-1,0)">⬅️</button>
        <button onclick="setDir(1,0)">➡️</button>
    </div>
    <div>
        <button onclick="setDir(0,1)">⬇️</button>
    </div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let snake = [{x: 10, y: 10}];
let direction = {x: 1, y: 0};
let food = {x: 5, y: 5};
let score = 0;

function setDir(x, y) {
    direction = {x, y};
}

function draw() {
    ctx.fillStyle = "#111";
    ctx.fillRect(0, 0, 300, 300);

    // snake
    ctx.fillStyle = "lime";
    snake.forEach(part => {
        ctx.fillRect(part.x * 15, part.y * 15, 14, 14);
    });

    // food
    ctx.fillStyle = "red";
    ctx.fillRect(food.x * 15, food.y * 15, 14, 14);
}

function update() {
    let head = {...snake[0]};
    head.x += direction.x;
    head.y += direction.y;

    // collision mur
    if (head.x < 0 || head.y < 0 || head.x >= 20 || head.y >= 20) {
        alert("Game Over");
        location.reload();
    }

    // collision soi-même
    if (snake.some(p => p.x === head.x && p.y === head.y)) {
        alert("Game Over");
        location.reload();
    }

    snake.unshift(head);

    if (head.x === food.x && head.y === food.y) {
        score++;
        document.getElementById("score").innerText = "Score: " + score;
        food = {
            x: Math.floor(Math.random() * 20),
            y: Math.floor(Math.random() * 20)
        };
    } else {
        snake.pop();
    }
}

// clavier (PC)
document.addEventListener("keydown", e => {
    if (e.key === "ArrowUp") setDir(0,-1);
    if (e.key === "ArrowDown") setDir(0,1);
    if (e.key === "ArrowLeft") setDir(-1,0);
    if (e.key === "ArrowRight") setDir(1,0);
});

setInterval(() => {
    update();
    draw();
}, 150);
</script>

</body>
</html>
